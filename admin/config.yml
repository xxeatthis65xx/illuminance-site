# ============================================================
#  Illuminance Wedding Films — Dashboard configuration
#
#  The "backend" block below tells the dashboard how you log in.
#  DecapBridge will GENERATE this block for you (with your repo
#  name and a site id) — paste what it gives you over the block
#  below. See SETUP.md, Step 4.
# ============================================================

# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: xxeatthis65xx/illuminance-site
  branch: main
  identity_url: https://auth.decapbridge.com/sites/f2db28e1-16c5-4e81-af26-652cb8a2513f
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Where uploaded photos are stored, and how the site refers to them
media_folder: "images"
public_folder: "/images"

# Nicer labels in the editor
site_url: https://illuminance-site.netlify.app
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

collections:
  # ---------- SITE SETTINGS ----------
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "Home & About"
        file: "content/site.json"
        fields:
          - { label: "Hero heading", name: "heroTitle", widget: "string" }
          - { label: "Hero subheading", name: "heroSubtitle", widget: "string" }
          - { label: "Hero small text (eyebrow)", name: "heroEyebrow", widget: "string" }
          - { label: "Hero film (YouTube link)", name: "heroVideo", widget: "string", required: false, hint: "Paste a YouTube link. Leave blank to show the placeholder." }
          - { label: "About quote", name: "aboutQuote", widget: "text" }
          - { label: "About quote sign-off", name: "aboutSignoff", widget: "string" }
          - label: "About paragraphs"
            name: "bio"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }

  # ---------- PORTFOLIO ----------
  - name: "portfolio"
    label: "Portfolio (Couples)"
    files:
      - name: "couples"
        label: "All Couples"
        file: "content/portfolio.json"
        fields:
          - label: "Couples"
            name: "couples"
            widget: "list"
            label_singular: "Couple"
            summary: "{{fields.name}}"
            fields:
              - { label: "Couple names", name: "name", widget: "string" }
              - { label: "Date", name: "date", widget: "string", required: false }
              - { label: "Venue / location", name: "venue", widget: "string", required: false }
              - { label: "Cover photo", name: "photo", widget: "image", required: false }
              - { label: "Film link (YouTube)", name: "film", widget: "string", required: false, hint: "Where this couple's film opens when clicked." }

  # ---------- GALLERY ----------
  - name: "gallery"
    label: "Gallery (Photos)"
    files:
      - name: "photos"
        label: "All Photos"
        file: "content/gallery.json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            label_singular: "Photo"
            summary: "{{fields.caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string", required: false }
              - label: "Tile size"
                name: "size"
                widget: "select"
                default: "normal"
                options: ["normal", "tall", "wide"]

  # ---------- PACKAGES ----------
  - name: "packages"
    label: "Packages & Add-Ons"
    files:
      - name: "packages"
        label: "Packages"
        file: "content/packages.json"
        fields:
          - label: "Packages"
            name: "packages"
            widget: "list"
            label_singular: "Package"
            summary: "{{fields.name}} — ${{fields.price}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - label: "Time-of-day theme"
                name: "sky"
                widget: "select"
                options: ["dawn", "golden", "star", "ever"]
                hint: "dawn = First Light look, golden = sunset, star = night, ever = moonlit"
              - { label: "Show stars in background", name: "stars", widget: "boolean", default: false }
              - { label: "Price (no $ sign)", name: "price", widget: "string" }
              - { label: "Badge (optional)", name: "badge", widget: "string", required: false, hint: "e.g. Our Signature" }
              - { label: "Tagline", name: "tagline", widget: "text" }
              - label: "Features"
                name: "features"
                widget: "list"
                field: { label: "Feature", name: "feature", widget: "string" }
              - { label: "Savings note", name: "save", widget: "string", required: false }
          - label: "Add-Ons"
            name: "addons"
            widget: "list"
            label_singular: "Add-On"
            summary: "{{fields.name}} — ${{fields.price}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "number", value_type: "int" }
